<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task - จัดการงานส่วนตัวและแจ้งเตือนครบกำหนด</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS STYLES - COMBINED & REFINED */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            
            --font-main: 'Inter', 'Sarabun', sans-serif;
        }

        .light-theme {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER & NAVIGATION */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
            color: var(--primary-color);
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo-text p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .app-navigation {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 8px;
            gap: 4px;
        }

        .light-theme .app-navigation {
            background: rgba(0, 0, 0, 0.05);
        }

        .nav-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab.active {
            background: var(--primary-color);
            color: white;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-color);
        }

        .light-theme .btn-secondary {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            justify-content: center;
            padding: 0;
        }

        .light-theme .btn-icon {
            background: rgba(0, 0, 0, 0.05);
        }

        /* NOTIFICATION SYSTEM UI */
        .notification-bell-container {
            position: relative;
        }

        .badge-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--danger);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }

        .notification-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            width: 320px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 100;
            display: none;
            overflow: hidden;
            max-height: 400px;
        }

        .notification-dropdown.active {
            display: block;
        }

        .notif-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .notif-header h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .notif-list {
            overflow-y: auto;
            max-height: 330px;
        }

        .notif-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            cursor: pointer;
        }

        .notif-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .light-theme .notif-item:hover {
            background-color: rgba(0, 0, 0, 0.02);
        }

        .notif-icon {
            font-size: 1.2rem;
            margin-top: 2px;
        }

        .notif-icon.overdue { color: var(--danger); }
        .notif-icon.upcoming { color: var(--warning); }

        .notif-info h5 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .notif-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .notif-empty {
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* URGENT WARNING BANNER */
        .alert-banner {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid var(--danger);
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .alert-banner-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-banner-content i {
            font-size: 1.4rem;
        }

        .alert-banner-text h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .alert-banner-text p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* VIEWS & LAYOUT */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        .view-header {
            margin-bottom: 24px;
        }

        .view-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .view-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* STATS COUNTERS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-sm);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: white;
        }

        .total-tasks .stat-icon { background-color: var(--info); }
        .pending-tasks .stat-icon { background-color: var(--warning); }
        .completed-tasks .stat-icon { background-color: var(--success); }
        .overdue-tasks .stat-icon { background-color: var(--danger); }

        .stat-details {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* DASHBOARD GRID & EISENHOWER MATRIX */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (min-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        .dashboard-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .dashboard-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* PRODUCTIVITY INNER ELEMENT */
        .productivity-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .progress-ring-container {
            width: 70px;
            height: 70px;
            background: conic-gradient(var(--primary-color) 0%, rgba(255, 255, 255, 0.08) 0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .light-theme .progress-ring-container {
            background: conic-gradient(var(--primary-color) 0%, rgba(0, 0, 0, 0.08) 0);
        }

        .progress-ring-container::before {
            content: "";
            position: absolute;
            width: 54px;
            height: 54px;
            background-color: var(--bg-color);
            border-radius: 50%;
        }

        .progress-ring-text {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .progress-ring-text .text-xs {
            font-size: 0.6rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .progress-summary-details p {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .progress-summary-details span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* CATEGORY CHART */
        .category-chart-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-bar-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bar-label-group {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .bar-outer {
            height: 8px;
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .light-theme .bar-outer {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .bar-inner {
            height: 100%;
            width: 0%;
            border-radius: 4px;
        }

        .color-work { background-color: var(--primary-color); }
        .color-personal { background-color: var(--success); }
        .color-learning { background-color: var(--info); }
        .color-other { background-color: var(--text-muted); }

        /* KANBAN BOARD SYSTEM */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            align-items: start;
        }

        .kanban-column {
            background-color: rgba(30, 41, 59, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .light-theme .kanban-column {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .col-title-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .col-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .col-todo .col-status-dot { background-color: var(--info); }
        .col-inprogress .col-status-dot { background-color: var(--warning); }
        .col-review .col-status-dot { background-color: #a855f7; }
        .col-completed .col-status-dot { background-color: var(--success); }

        .column-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .card-count {
            background: rgba(255, 255, 255, 0.08);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .light-theme .card-count {
            background: rgba(0, 0, 0, 0.05);
        }

        .kanban-cards-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 200px;
        }

        /* TASK CARD UI (Drag & Drop) */
        .task-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            box-shadow: var(--shadow-sm);
            cursor: grab;
            position: relative;
        }

        .task-card:active {
            cursor: grabbing;
        }

        .task-card.dragging {
            opacity: 0.5;
            border-style: dashed;
        }

        .task-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 10px;
        }

        .task-card-title {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .task-card-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .task-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .task-card-deadline {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .task-card-deadline.danger { color: var(--danger); }
        .task-card-deadline.warning { color: var(--warning); }

        .task-card-actions {
            display: flex;
            gap: 5px;
        }

        .task-btn-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .task-btn-delete:hover {
            color: var(--danger);
        }

        /* MODAL WINDOW SYSTEM */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            max-width: 550px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-btn {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .close-btn:hover {
            color: var(--text-color);
        }

        #task-form {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 640px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .required {
            color: var(--danger);
        }

        input[type="text"], textarea, select, input[type="date"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 0.9rem;
            outline: none;
            width: 100%;
        }

        .light-theme input[type="text"], 
        .light-theme textarea, 
        .light-theme select, 
        .light-theme input[type="date"] {
            background: rgba(0, 0, 0, 0.03);
        }

        input[type="text"]:focus, textarea:focus, select:focus, input[type="date"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="app-container">
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-icon"><i class="fa-solid fa-square-check"></i></div>
                <div class="logo-text">
                    <h1>My Task</h1>
                    <p>จัดการงานของน้ำฝน</p>
                </div>
            </div>
            
            <nav class="app-navigation">
                <button class="nav-tab active" data-tab="dashboard-view">
                    <i class="fa-solid fa-chart-pie"></i> Overview
                </button>
                <button class="nav-tab" data-tab="kanban-view">
                    <i class="fa-solid fa-table-columns"></i> All Task
                </button>
            </nav>
            
            <div class="header-actions">
                <div class="notification-bell-container">
                    <button id="notif-bell-btn" class="btn btn-icon" title="การแจ้งเตือนงาน">
                        <i class="fa-solid fa-bell"></i>
                        <span id="notif-badge" class="badge-count">0</span>
                    </button>
                    <div id="notif-dropdown" class="notification-dropdown">
                        <div class="notif-header">
                            <h4><i class="fa-solid fa-bell"></i> รายการแจ้งเตือนด่วน</h4>
                            <span id="notif-summary" class="badge badge-status-todo">0 แจ้งเตือน</span>
                        </div>
                        <div id="notif-list" class="notif-list">
                            </div>
                    </div>
                </div>

                <button id="add-task-btn" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> เพิ่มงานใหม่
                </button>
                <button id="theme-toggle-btn" class="btn btn-icon" title="เปลี่ยนธีม">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
        </header>

        <div id="alert-banner" class="alert-banner">
            <div class="alert-banner-content">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <div class="alert-banner-text">
                    <h4>พบงานเกินกำหนดหรือใกล้ถึงกำหนด!</h4>
                    <p id="alert-banner-desc">ตรวจสอบรายละเอียดได้ที่กระดานงานหรือแถบแจ้งเตือน</p>
                </div>
            </div>
        </div>

        <main id="dashboard-view" class="view-section active">
            <div class="view-header">
                <h2>ภาพรวมแดชบอร์ด</h2>
                <p class="view-subtitle">วิเคราะห์ข้อมูลประสิทธิภาพและการทำภารกิจส่วนตัว</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card total-
