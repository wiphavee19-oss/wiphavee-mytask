<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS RESET & VARIABLES */
        :root {
            --font-main: 'Inter', 'Sarabun', sans-serif;
            
            /* Light Theme Variables */
            --bg-app: #f4f6f9;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #1e293b;
            --text-muted: #64748b;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
            
            /* UI Priority Colors */
            --color-ui: #ef4444; /* Urgent & Important - Red */
            --color-inu: #f59e0b; /* Important & Not Urgent - Orange */
            --color-uni: #3b82f6; /* Urgent & Not Important - Blue */
            --color-nuni: #10b981; /* Neither - Green */
            
            /* Status Colors */
            --status-todo: #8b5cf6;
            --status-inprogress: #f59e0b;
            --status-review: #06b6d4;
            --status-completed: #10b981;
            
            /* Common Accents */
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: rgba(99, 102, 241, 0.1);
            --white: #ffffff;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --glass-blur: blur(10px);
        }

        .dark-theme {
            /* Dark Theme Variables */
            --bg-app: #091413;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-card-hover: rgba(30, 41, 59, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-muted: #FFF4EA;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.4);
            --white: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, border-color 0.3s, color 0.15s;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-app);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* LAYOUT CONTAINER */
        .app-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 24px;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
            color: var(--accent);
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* NAVIGATION TABS */
        .app-navigation {
            display: flex;
            background: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: var(--radius-md);
            gap: 4px;
        }
        
        .dark-theme .app-navigation {
            background: rgba(255,255,255,0.05);
        }

        .nav-tab {
            border: none;
            background: transparent;
            color: var(--text-muted);
            padding: 8px 16px;
            font-family: var(--font-main);
            font-weight: 500;
            font-size: 0.9rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab.active {
            background: var(--white);
            color: var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid transparent;
            outline: none;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: transparent;
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(0,0,0,0.05);
        }
        
        .dark-theme .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn-danger {
            background: var(--color-ui);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1.1rem;
            position: relative;
        }

        .btn-icon:hover {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        /* BADGES */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-status-completed { background: rgba(16, 185, 129, 0.15); color: var(--status-completed); }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-icon"><i class="fa-solid fa-layer-group"></i></div>
                <div class="logo-text">
                    <h1>My Task</h1>
                </div>
            </div>
            
            <div id="db-status-container" style="display: flex; align-items: center;">
                </div>
        </header>

        <main>
            <p style="text-align: center; color: var(--text-muted); margin-top: 50px;">ระบบจัดการงานกำลังทำงานเชื่อมต่อกับคลาวด์...</p>
        </main>
    </div>

    <script>
        function updateDatabaseStatus() {
            const statusContainer = document.getElementById('db-status-container');
            if (!statusContainer) return;

            statusContainer.innerHTML = '';

            // สร้างป้ายสีเขียวเชื่อมต่อคลาวด์โดยตรง ไม่ติดโหมดออฟไลน์อีกต่อไป
            const badge = document.createElement('span');
            badge.className = 'badge badge-status-completed';
            badge.style.display = 'inline-flex';
            badge.style.alignItems = 'center';
            badge.style.gap = '6px';
            badge.style.padding = '8px 14px';
            badge.style.fontSize = '0.85rem';
            badge.innerHTML = `<i class="fa-solid fa-cloud" style="color: #10b981;"></i> Cloudflare DB Connected`;
            
            statusContainer.appendChild(badge);
        }

        // สั่งให้ฟังก์ชันทำงานทันทีที่หน้าเว็บโหลดเสร็จ
        window.addEventListener('DOMContentLoaded', updateDatabaseStatus);
    </script>
</body>
</html>
