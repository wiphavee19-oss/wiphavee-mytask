<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task - จัดการงานส่วนตัวและแจ้งเตือนครบกำหนด</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS STYLES - COMBINED & REFINED */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            
            --font-main: 'Inter', 'Sarabun', sans-serif;
        }

        .light-theme {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER & NAVIGATION */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
            color: var(--primary-color);
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo-text p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .app-navigation {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 8px;
            gap: 4px;
        }

        .light-theme .app-navigation {
            background: rgba(0, 0, 0, 0.05);
        }

        .nav-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab.active {
            background: var(--primary-color);
            color: white;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-color);
        }

        .light-theme .btn-secondary {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            justify-content: center;
            padding: 0;
        }

        .light-theme .btn-icon {
            background: rgba(0, 0, 0, 0.05);
        }

        /* NOTIFICATION SYSTEM UI */
        .notification-bell-container {
            position: relative;
        }

        .badge-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--danger);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }

        .notification-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            width: 320px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 100;
            display: none;
            overflow: hidden;
            max-height: 400px;
        }

        .notification-dropdown.active {
            display: block;
        }

        .notif-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .notif-header h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .notif-list {
            overflow-y: auto;
            max-height: 330px;
        }

        .notif-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            cursor: pointer;
        }

        .notif-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .light-theme .notif-item:hover {
            background-color: rgba(0, 0, 0, 0.02);
        }

        .notif-icon {
            font-size: 1.2rem;
            margin-top: 2px;
        }

        .notif-icon.overdue { color: var(--danger); }
        .notif-icon.upcoming { color: var(--warning); }

        .notif-info h5 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .notif-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .notif-empty {
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* URGENT WARNING BANNER */
        .alert-banner {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid var(--danger);
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .alert-banner.warning-only {
            background: rgba(245, 158, 11, 0.15);
            border-left: 4px solid var(--warning);
        }

        .alert-banner-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-banner-content i {
            font-size: 1.4rem;
        }

        .alert-banner-text h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .alert-banner-text p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* VIEWS & LAYOUT */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        .view-header {
            margin-bottom: 24px;
        }

        .view-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .view-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* STATS COUNTERS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-sm);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: white;
        }

        .total-tasks .stat-icon { background-color: var(--info); }
        .pending-tasks .stat-icon { background-color: var(--warning); }
        .completed-tasks .stat-icon { background-color: var(--success); }
        .overdue-tasks .stat-icon { background-color: var(--danger); }

        .stat-details {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
